[plugins]
allow_loading_unsigned_plugins = doris-app

[auth.anonymous]
enabled = true
org_role = Admin

[auth]
disable_login_form = true

# Display all timestamps in UTC so the doris-app's literal-string time
# windows match Doris's storage (which the OTEL collector also writes in UTC).
[date_formats]
default_timezone = utc
use_browser_locale = false
