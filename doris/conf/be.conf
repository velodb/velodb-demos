PPROF_TMPDIR="$DORIS_HOME/log/"
JAVA_OPTS_FOR_JDK_17="-Xmx1024m -DlogPath=$DORIS_HOME/log/jni.log -Xloggc:$DORIS_HOME/log/be.gc.log.$CUR_DATE -Djavax.security.auth.useSubjectCredsOnly=false -Dsun.security.krb5.debug=true"

sys_log_level = INFO

# Network
priority_networks = 0.0.0.0/0
be_port = 9060
webserver_port = 8040
heartbeat_service_port = 9050
brpc_port = 8060

# Memory limits tuned for laptop demo (4 GB)
mem_limit = 4G

# Storage
storage_root_path = ${DORIS_HOME}/storage

# Reduce default thread/concurrency footprint
default_num_rows_per_column_file_block = 1024
